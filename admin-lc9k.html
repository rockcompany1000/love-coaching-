<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 | 상담 신청 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background: #f0f4f8; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.5rem 1.25rem; border-radius: 6px; font-weight: 600;
      font-size: 0.875rem; cursor: pointer; border: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover  { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-navy  { background: #1a2744; color: #fff; }
    .btn-navy:hover  { background: #253660; }

    .btn-gold  { background: #c9a84c; color: #1a2744; }
    .btn-gold:hover  { background: #e0bc5a; }

    .btn-green { background: #38a169; color: #fff; }
    .btn-green:hover { background: #2f855a; }

    .btn-gray  { background: #e2e8f0; color: #4a5568; }
    .btn-gray:hover  { background: #cbd5e0; }

    .badge-pending { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; border-radius: 100px; padding: 0.2rem 0.75rem; font-size: 0.78rem; font-weight: 600; }
    .badge-done    { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; border-radius: 100px; padding: 0.2rem 0.75rem; font-size: 0.78rem; font-weight: 600; }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #1a2744; color: #fff; padding: 0.875rem 1rem; text-align: left; font-weight: 600; font-size: 0.875rem; }
    .data-table td { padding: 0.875rem 1rem; border-bottom: 1px solid #e2e8f0; font-size: 0.875rem; color: #2d3748; vertical-align: middle; }
    .data-table tr:hover td { background: #f7faff; }

    /* Modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal    { background: #fff; border-radius: 14px; padding: 2rem; max-width: 560px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.2); }

    /* Login */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; box-shadow: 0 4px 30px rgba(26,39,68,.12); }

    .f-input {
      width: 100%; padding: 0.875rem 1rem; border: 2px solid #e2e8f0; border-radius: 8px;
      font-size: 1rem; font-family: 'Noto Sans KR', sans-serif;
      transition: border-color .15s, box-shadow .15s;
    }
    .f-input:focus { outline: none; border-color: #2d4a8a; box-shadow: 0 0 0 3px rgba(45,74,138,.15); }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════
     LOGIN SCREEN
════════════════════════════════ -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:1.75rem;">
      <div style="font-size:2rem;margin-bottom:0.5rem;">🔒</div>
      <h1 style="font-size:1.3rem;font-weight:700;color:#1a2744;">관리자 로그인</h1>
      <p style="font-size:0.875rem;color:#718096;margin-top:0.25rem;">상담 신청 관리 페이지</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:1rem;">
      <div>
        <label style="display:block;font-weight:600;font-size:0.9rem;color:#1a2744;margin-bottom:0.4rem;">비밀번호</label>
        <input id="pw-input" class="f-input" type="password" placeholder="비밀번호 입력"
               onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn btn-navy" style="width:100%;padding:0.875rem;" onclick="doLogin()">
        로그인
      </button>
      <p id="login-err" style="color:#e53e3e;font-size:0.85rem;text-align:center;display:none;">
        비밀번호가 올바르지 않습니다.
      </p>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════
     DASHBOARD
════════════════════════════════ -->
<div id="dashboard" style="display:none;">

  <!-- Header -->
  <header style="background:#1a2744;padding:1rem 1.5rem;position:sticky;top:0;z-index:40;">
    <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <span style="color:#fff;font-weight:700;font-size:1.05rem;">📋 상담 신청 관리</span>
      </div>
      <div style="display:flex;gap:0.75rem;align-items:center;">
        <button class="btn btn-gold" onclick="loadData()" id="refresh-btn">↺ 새로고침</button>
        <button class="btn btn-gray" onclick="doLogout()">로그아웃</button>
      </div>
    </div>
  </header>

  <main style="max-width:1200px;margin:0 auto;padding:1.5rem;">

    <!-- Stats -->
    <div id="stats-row" style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;">
      <div style="background:#fff;border-radius:12px;padding:1.25rem 1.5rem;box-shadow:0 2px 12px rgba(26,39,68,.07);">
        <p style="font-size:0.8rem;color:#718096;margin-bottom:0.25rem;">전체 신청</p>
        <p id="stat-total" style="font-size:1.75rem;font-weight:700;color:#1a2744;">-</p>
      </div>
      <div style="background:#fff;border-radius:12px;padding:1.25rem 1.5rem;box-shadow:0 2px 12px rgba(26,39,68,.07);">
        <p style="font-size:0.8rem;color:#718096;margin-bottom:0.25rem;">대기중</p>
        <p id="stat-pending" style="font-size:1.75rem;font-weight:700;color:#d97706;">-</p>
      </div>
      <div style="background:#fff;border-radius:12px;padding:1.25rem 1.5rem;box-shadow:0 2px 12px rgba(26,39,68,.07);">
        <p style="font-size:0.8rem;color:#718096;margin-bottom:0.25rem;">완료</p>
        <p id="stat-done" style="font-size:1.75rem;font-weight:700;color:#38a169;">-</p>
      </div>
    </div>

    <!-- Filter -->
    <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
      <button class="btn btn-navy" onclick="setFilter('all')" id="f-all">전체</button>
      <button class="btn btn-gray" onclick="setFilter('pending')" id="f-pending">대기중만</button>
      <button class="btn btn-gray" onclick="setFilter('완료')" id="f-done">완료만</button>
    </div>

    <!-- Table -->
    <div style="background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 16px rgba(26,39,68,.08);">
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:40px;">#</th>
              <th>이름</th>
              <th>연락처</th>
              <th>이메일</th>
              <th>연애 현황</th>
              <th>접수일</th>
              <th style="width:90px;">상태</th>
              <th style="width:140px;">관리</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="8" style="text-align:center;padding:3rem;color:#a0aec0;">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <p id="empty-msg" style="display:none;text-align:center;padding:3rem;color:#a0aec0;">
      신청 내역이 없습니다.
    </p>
  </main>
</div>


<!-- ═══════════════════════════════
     DETAIL MODAL
════════════════════════════════ -->
<div id="modal-bg" class="modal-bg" style="display:none;" onclick="closeModal(event)">
  <div class="modal fade-in" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
      <h2 style="font-size:1.2rem;font-weight:700;color:#1a2744;">상담 신청 상세</h2>
      <button onclick="closeModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:#718096;line-height:1;">×</button>
    </div>
    <div id="modal-content"></div>
    <div style="margin-top:1.5rem;display:flex;justify-content:flex-end;gap:0.75rem;">
      <button id="modal-status-btn" class="btn btn-green" onclick="toggleStatusFromModal()">완료로 변경</button>
      <button class="btn btn-gray" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>


<script>
  const API = '/api/admin';
  let token = '';
  let allData = [];
  let currentFilter = 'all';
  let modalCurrentId = '';
  let modalCurrentStatus = '';

  // ── 로그인 ──────────────────────────────────────────────
  async function doLogin() {
    const pw = document.getElementById('pw-input').value;
    if (!pw) return;

    const btn = document.querySelector('#login-screen .btn-navy');
    btn.disabled = true;
    btn.textContent = '확인 중...';

    try {
      const res = await fetch(API, {
        headers: { 'Authorization': `Bearer ${pw}`, 'Content-Type': 'application/json' }
      });

      if (res.status === 401) {
        document.getElementById('login-err').style.display = 'block';
        btn.disabled = false;
        btn.textContent = '로그인';
        return;
      }

      token = pw;
      sessionStorage.setItem('admin_token', token);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      await loadData();

    } catch (e) {
      alert('오류가 발생했습니다.');
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  }

  function doLogout() {
    sessionStorage.removeItem('admin_token');
    token = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
  }

  // ── 데이터 로드 ─────────────────────────────────────────
  async function loadData() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '로딩 중...';

    try {
      const res = await fetch(API, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const json = await res.json();

      if (!res.ok) throw new Error(json.error);

      allData = json.data || [];
      updateStats();
      renderTable();
    } catch (e) {
      alert('데이터 로드 실패: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '↺ 새로고침';
    }
  }

  // ── 통계 ────────────────────────────────────────────────
  function updateStats() {
    const total   = allData.length;
    const pending = allData.filter(r => r.status !== '완료').length;
    const done    = allData.filter(r => r.status === '완료').length;
    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-done').textContent    = done;
  }

  // ── 필터 ────────────────────────────────────────────────
  function setFilter(f) {
    currentFilter = f;
    ['all','pending','완료'].forEach(k => {
      const el = document.getElementById('f-' + (k === '완료' ? 'done' : k === 'pending' ? 'pending' : 'all'));
      if (el) el.className = 'btn ' + (k === f ? 'btn-navy' : 'btn-gray');
    });
    renderTable();
  }

  // ── 테이블 렌더링 ────────────────────────────────────────
  function renderTable() {
    let rows = allData;
    if (currentFilter === 'pending') rows = allData.filter(r => r.status !== '완료');
    if (currentFilter === '완료')    rows = allData.filter(r => r.status === '완료');

    const tbody = document.getElementById('table-body');

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:3rem;color:#a0aec0;">해당 신청이 없습니다.</td></tr>`;
      return;
    }

    tbody.innerHTML = rows.map((r, i) => {
      const isDone = r.status === '완료';
      const date   = new Date(r.created_at).toLocaleDateString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      return `
        <tr>
          <td style="color:#a0aec0;">${rows.length - i}</td>
          <td style="font-weight:600;">${esc(r.name)}</td>
          <td>${esc(r.phone)}</td>
          <td style="color:#4a5568;">${esc(r.email)}</td>
          <td>${esc(r.status)}</td>
          <td style="color:#718096;font-size:0.8rem;">${date}</td>
          <td>
            <span class="${isDone ? 'badge-done' : 'badge-pending'}">
              ${isDone ? '완료' : '대기중'}
            </span>
          </td>
          <td>
            <div style="display:flex;gap:0.4rem;">
              <button class="btn btn-navy" style="padding:0.35rem 0.75rem;font-size:0.8rem;"
                      onclick="openModal('${r.id}')">상세</button>
              <button class="btn ${isDone ? 'btn-gray' : 'btn-green'}"
                      style="padding:0.35rem 0.75rem;font-size:0.8rem;"
                      onclick="toggleStatus('${r.id}', '${r.status}', this)">
                ${isDone ? '되돌리기' : '완료'}
              </button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  // ── 상태 변경 ────────────────────────────────────────────
  async function toggleStatus(id, currentStatus, btn) {
    const newStatus = currentStatus === '완료' ? 'pending' : '완료';
    btn.disabled = true;
    btn.textContent = '...';

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status: newStatus }),
      });
      if (!res.ok) throw new Error();

      const row = allData.find(r => r.id === id);
      if (row) row.status = newStatus;
      updateStats();
      renderTable();
    } catch {
      alert('상태 변경 실패');
      btn.disabled = false;
      btn.textContent = currentStatus === '완료' ? '되돌리기' : '완료';
    }
  }

  // ── 상세 모달 ────────────────────────────────────────────
  function openModal(id) {
    const r = allData.find(r => r.id === id);
    if (!r) return;

    modalCurrentId     = id;
    modalCurrentStatus = r.status;

    const isDone = r.status === '완료';
    const date   = new Date(r.created_at).toLocaleString('ko-KR');

    document.getElementById('modal-content').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:0.875rem;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
          <div style="background:#f7faff;border-radius:8px;padding:0.875rem;">
            <p style="font-size:0.75rem;color:#718096;margin-bottom:0.2rem;">이름</p>
            <p style="font-weight:600;color:#1a2744;">${esc(r.name)}</p>
          </div>
          <div style="background:#f7faff;border-radius:8px;padding:0.875rem;">
            <p style="font-size:0.75rem;color:#718096;margin-bottom:0.2rem;">연락처</p>
            <p style="font-weight:600;color:#1a2744;">${esc(r.phone)}</p>
          </div>
          <div style="background:#f7faff;border-radius:8px;padding:0.875rem;">
            <p style="font-size:0.75rem;color:#718096;margin-bottom:0.2rem;">이메일</p>
            <p style="font-weight:600;color:#1a2744;">${esc(r.email)}</p>
          </div>
          <div style="background:#f7faff;border-radius:8px;padding:0.875rem;">
            <p style="font-size:0.75rem;color:#718096;margin-bottom:0.2rem;">연애 현황</p>
            <p style="font-weight:600;color:#1a2744;">${esc(r.status)}</p>
          </div>
        </div>
        <div style="background:#fff8e6;border-radius:8px;padding:1rem;border-left:3px solid #c9a84c;">
          <p style="font-size:0.75rem;color:#718096;margin-bottom:0.4rem;">고민 내용</p>
          <p style="color:#1a2744;line-height:1.8;white-space:pre-wrap;">${esc(r.concern)}</p>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="${isDone ? 'badge-done' : 'badge-pending'}">${isDone ? '완료' : '대기중'}</span>
          <span style="font-size:0.8rem;color:#718096;">접수: ${date}</span>
        </div>
      </div>
    `;

    const statusBtn = document.getElementById('modal-status-btn');
    statusBtn.textContent = isDone ? '대기중으로 되돌리기' : '완료로 변경';
    statusBtn.className   = 'btn ' + (isDone ? 'btn-gray' : 'btn-green');

    document.getElementById('modal-bg').style.display = 'flex';
  }

  async function toggleStatusFromModal() {
    const newStatus = modalCurrentStatus === '완료' ? 'pending' : '완료';
    const btn = document.getElementById('modal-status-btn');
    btn.disabled = true;
    btn.textContent = '처리 중...';

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: modalCurrentId, status: newStatus }),
      });
      if (!res.ok) throw new Error();

      const row = allData.find(r => r.id === modalCurrentId);
      if (row) row.status = newStatus;
      modalCurrentStatus = newStatus;

      updateStats();
      renderTable();
      closeModal();
    } catch {
      alert('상태 변경 실패');
      btn.disabled = false;
    }
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('modal-bg')) return;
    document.getElementById('modal-bg').style.display = 'none';
  }

  // ── XSS 방지 ─────────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── 자동 로그인 (세션 유지) ──────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('admin_token');
    if (saved) {
      token = saved;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    }
  });
</script>

</body>
</html>
